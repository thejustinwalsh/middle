# Dashboard end-to-end smoke (#224). A separate Playwright job so the three
# Chromium smoke specs are visible in the PR-checks rollup on every push / PR —
# they're deliberately NOT part of the `bun test` gate (Chromium isn't a dispatch
# prerequisite, and Playwright uses its own runner, not `bun:test`).
name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dashboard-playwright:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (not mutable tags) so a re-tag can't change
      # what runs; `persist-credentials: false` keeps the checkout token out of
      # the worktree's git config. Version comments track the pinned release.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      # Resolve the dashboard's pinned Playwright version FROM the package dir (so
      # bunx uses the local `@playwright/test`, not a bunx-fetched newer copy — see
      # packages/dashboard/CLAUDE.md) and key the browser cache on it: browser builds
      # are version-specific, so the key must move when the pin moves (#247).
      - name: Resolve Playwright version
        id: pw
        working-directory: packages/dashboard
        run: echo "version=$(bunx playwright --version | awk '{print $NF}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
      # Install FROM the package dir so bunx resolves the pinned version and provisions
      # the matching browser build (a root-level bunx downloads a newer Playwright and
      # installs the wrong build, leaving the headless shell the tests launch missing —
      # #247). On a cache hit the browser download is skipped; --with-deps still
      # refreshes the apt system libs, which aren't cached.
      - name: Install Chromium
        working-directory: packages/dashboard
        run: bunx playwright install --with-deps chromium
      - name: Run dashboard Playwright smoke
        working-directory: packages/dashboard
        run: bunx playwright test
